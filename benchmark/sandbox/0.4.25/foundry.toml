[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Compiler settings
solc_version = "0.4.25"
optimizer = true
optimizer_runs = 200
initial_balance = "1000000000000000000000"

# Gas settings
gas_price = 0
gas_limit = 8500000  

# Network settings
[rpc_endpoints]
development = "http://127.0.0.1:8545"

# Test settings
[fuzz]
runs = 1000

[invariant]
runs = 1000
depth = 100

# Deployment settings
[profile.default.networks.development]
url = "http://127.0.0.1:8545"